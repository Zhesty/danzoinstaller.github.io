<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyUpload</title>
<style>
body {font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px;}
.upload-box {border:2px dashed #22c55e;padding:40px;border-radius:15px;background:#1e293b;cursor:pointer;}
input {display:none;}
.file-item {margin-top:20px;background:#1e293b;padding:15px;border-radius:10px;}
a {color:#22d3ee;word-break:break-all;}
</style>
</head>
<body>

<h1>🚀 Upload File</h1>

<div class="upload-box" onclick="fileInput.click()">
Click or Drag File
<input type="file" id="fileInput">
</div>

<div id="result"></div>

<script>
const fileInput = document.getElementById("fileInput");
const result = document.getElementById("result");

fileInput.addEventListener("change", async () => {
  const file = fileInput.files[0];
  if(!file) return;

  result.innerHTML = "Uploading...";

  const serverRes = await fetch("https://api.gofile.io/servers");
  const serverData = await serverRes.json();
  const server = serverData.data.servers[0].name;

  const formData = new FormData();
  formData.append("file", file);

  const uploadRes = await fetch(`https://${server}.gofile.io/uploadFile`, {
    method: "POST",
    body: formData
  });

  const uploadData = await uploadRes.json();

  if(uploadData.status === "ok") {
    const fileId = uploadData.data.fileId;
    const customLink = window.location.origin + "/file.html?id=" + fileId;
    result.innerHTML = "Link: <br><a href='"+customLink+"' target='_blank'>"+customLink+"</a>";
  } else {
    result.innerHTML = "Upload gagal.";
  }
});
</script>

</body>
</html>
