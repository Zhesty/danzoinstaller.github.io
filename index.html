<!DOCTYPE html>
<html>
<head>
  <title>My File Upload</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }
    input {
      margin: 20px;
    }
    button {
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    a {
      color: #22d3ee;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Upload File</h1>
    <input type="file" id="fileInput" />
    <br>
    <button onclick="uploadFile()">Upload</button>
    <p id="result"></p>
  </div>

<script>
async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const result = document.getElementById("result");

  if (!fileInput.files.length) {
    alert("Pilih file dulu!");
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  result.innerHTML = "Uploading...";

  try {
    const response = await fetch("https://pixeldrain.com/api/file", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (data.success) {
      const link = "https://pixeldrain.com/u/" + data.id;
      result.innerHTML = `Link: <br><a href="${link}" target="_blank">${link}</a>`;
    } else {
      result.innerHTML = "Upload gagal!";
    }

  } catch (error) {
    result.innerHTML = "Error upload!";
  }
}
</script>

</body>
</html>
