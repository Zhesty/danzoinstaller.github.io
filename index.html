<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyUpload - Free File Hosting</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    h1 { margin-bottom: 30px; }
    .upload-box {
      border: 2px dashed #3b82f6;
      padding: 40px;
      border-radius: 15px;
      cursor: pointer;
      background: #1e293b;
      transition: 0.3s;
    }
    .upload-box:hover {
      background: #273549;
    }
    input { display: none; }
    .file-item {
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
    }
    .progress {
      height: 8px;
      background: #334155;
      border-radius: 5px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      transition: width 0.3s;
    }
    a {
      color: #22d3ee;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>🚀 MyUpload</h1>

<div class="upload-box" id="dropArea">
  Drag & Drop Files Here or Click to Select
  <input type="file" id="fileInput" multiple>
</div>

<div id="fileList"></div>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

dropArea.addEventListener("click", () => fileInput.click());

dropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropArea.style.background = "#334155";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.background = "#1e293b";
});

dropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dropArea.style.background = "#1e293b";
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener("change", () => {
  handleFiles(fileInput.files);
});

function handleFiles(files) {
  [...files].forEach(file => uploadFile(file));
}

async function uploadFile(file) {
  const fileItem = document.createElement("div");
  fileItem.className = "file-item";
  fileItem.innerHTML = `
    <strong>${file.name}</strong>
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="link"></div>
  `;
  fileList.appendChild(fileItem);

  const progressBar = fileItem.querySelector(".progress-bar");
  const linkDiv = fileItem.querySelector(".link");

  const formData = new FormData();
  formData.append("file", file);

  const xhr = new XMLHttpRequest();
  xhr.open("POST", "https://pixeldrain.com/api/file");

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const percent = (e.loaded / e.total) * 100;
      progressBar.style.width = percent + "%";
    }
  };

  xhr.onload = () => {
    const response = JSON.parse(xhr.responseText);
    if (response.success) {
      const link = "https://pixeldrain.com/u/" + response.id;
      linkDiv.innerHTML = `<br>Link: <a href="${link}" target="_blank">${link}</a>`;
    } else {
      linkDiv.innerHTML = "<br>Upload gagal.";
    }
  };

  xhr.onerror = () => {
    linkDiv.innerHTML = "<br>Error upload.";
  };

  xhr.send(formData);
}
</script>

</body>
</html>
